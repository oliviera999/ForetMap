<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ForêtMap – Hors ligne</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #f0f4f0;
      font-family: 'DM Sans', system-ui, sans-serif;
      color: #1a4731;
      padding: 2rem;
      text-align: center;
      gap: 1.5rem;
    }
    img { width: 96px; height: 96px; border-radius: 20px; }
    h1 { font-size: 1.5rem; font-weight: 600; }
    p { color: #4a7c5e; max-width: 320px; line-height: 1.5; }
    button {
      margin-top: 0.5rem;
      padding: 0.75rem 2rem;
      background: #1a4731;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
    }
    button:hover { background: #2d7a4f; }
  </style>
</head>
<body>
  <img src="/icon.svg" alt="ForêtMap" />
  <h1>Vous êtes hors ligne</h1>
  <p>Reconnectez-vous à internet pour accéder à ForêtMap. Les données consultées récemment restent disponibles.</p>
  <button onclick="window.location.reload()">Réessayer</button>
</body>
</html>
