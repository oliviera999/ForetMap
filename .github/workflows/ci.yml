name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: ''
          MYSQL_ALLOW_EMPTY_PASSWORD: yes
          MYSQL_DATABASE: foretmap_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: node --test --test-concurrency=1 --test-force-exit tests/*.test.js
        env:
          NODE_ENV: test
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_NAME: foretmap_test
          DB_USER: root
          DB_PASS: ''
          TEACHER_PIN: '1234'
          JWT_SECRET: 'ci-test-secret-not-for-production'

      - name: Build frontend (Vite)
        run: npm run build

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Start app server for e2e
        run: |
          npm run db:init
          nohup npm run start:e2e > /tmp/foretmap-server.log 2>&1 &
        env:
          NODE_ENV: test
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_NAME: foretmap_test
          DB_USER: root
          DB_PASS: ''
          TEACHER_PIN: '1234'
          JWT_SECRET: 'ci-test-secret-not-for-production'

      - name: Wait for app health
        run: |
          for i in {1..30}; do
            curl -fsS http://127.0.0.1:3000/api/health && exit 0
            sleep 2
          done
          echo "API did not become healthy in time"
          exit 1

      - name: Run Playwright smoke e2e
        run: npm run test:e2e
        env:
          E2E_BASE_URL: http://127.0.0.1:3000
          NODE_ENV: test
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_NAME: foretmap_test
          DB_USER: root
          DB_PASS: ''
          TEACHER_PIN: '1234'
          JWT_SECRET: 'ci-test-secret-not-for-production'

      - name: Dump server log on failure
        if: failure()
        run: cat /tmp/foretmap-server.log || true

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
            /tmp/foretmap-server.log

