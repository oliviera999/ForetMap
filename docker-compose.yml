# MySQL 8 local — dev / tests (ne pas utiliser en production)
# Si le port 3306 est déjà pris : remplacer "3306:3306" par "3307:3306" et DB_PORT=3307 dans .env
services:
  mysql:
    image: mysql:8
    container_name: foretmap-mysql-local
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: foretmap_local_root
    ports:
      - "3306:3306"
    volumes:
      - foretmap_mysql_data:/var/lib/mysql
      - ./docker/mysql-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-pforetmap_local_root"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  foretmap_mysql_data:
