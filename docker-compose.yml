# MariaDB 11.4 (LTS) local — dev / tests (ne pas utiliser en production)
# Si le port 3306 est déjà pris : FORETMAP_DB_PUBLISH_PORT=3307 (shell ou .env à la racine) + DB_PORT=3307 pour l’app.
# Passage MySQL → MariaDB : recréer le volume (`docker compose down -v`) — les fichiers de données ne sont pas interchangeables.
services:
  mariadb:
    image: mariadb:11.4.10
    container_name: foretmap-mariadb-local
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: foretmap_local_root
    ports:
      - "${FORETMAP_DB_PUBLISH_PORT:-3306}:3306"
    volumes:
      - foretmap_mariadb_data:/var/lib/mysql
      - ./docker/mysql-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  foretmap_mariadb_data:
